name: Runner image
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0/12 * * *

concurrency:
  cancel-in-progress: true
  group: gitea-runner

jobs:
  runner-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Sirherobrine23
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup qemu
        uses: docker/setup-qemu-action@v3

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build rootless
        run: make runner-rootless

      - name: Build minimal
        run: make runner-minimal

      - name: Build custom
        run: make runner-custom

      - name: Push
        run: make runner DOCKER_ARGS=--push
