name: Runner image
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0/12 * * *

concurrency:
  cancel-in-progress: true
  group: gitea-runner

permissions:
    contents: read
    packages: write
    attestations: write
    id-token: write

jobs:
  runner-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Github Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: Sirherobrine23
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: sirherobrine23
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup qemu
        uses: docker/setup-qemu-action@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4

      - name: Build rootless
        run: make runner-rootless DOCKER_ARGS=--push

      - name: Build minimal
        run: make runner-minimal DOCKER_ARGS=--push

      - name: Build custom
        run: make runner-custom DOCKER_ARGS=--push
