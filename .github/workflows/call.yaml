name: Builder
on:
  workflow_call:
    secrets:
      DOCKER_TOKEN:
        required: true
    inputs:
      DOCKER_TAG:
        required: true
        type: string
      GITEA_TAG:
        required: true
        type: string
      GITEA_REPO:
        type: string
        default: "https://github.com/go-gitea/gitea.git"
      GITEA_VERSION:
        required: true
        type: string

jobs:
  image-builder:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: sirherobrine23.com.br
        username: sirherobrine23
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Setup qemu
      uses: docker/setup-qemu-action@v3

    - name: Setup buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/arm64,linux/amd64,linux/riscv64,linux/ppc64le,linux/s390x,linux/386,linux/arm/v7,linux/arm/v6
        tags: sirherobrine23.com.br/gitea/gitea:${{inputs.DOCKER_TAG}}
        build-args: |
          GITEA_TAG=${{inputs.GITEA_TAG}}
          GITEA_VERSION=${{inputs.GITEA_VERSION}}
          GITEA_REPO=${{inputs.GITEA_REPO}}