name: Builder
on:
  workflow_call:
    secrets:
      DOCKER_TOKEN:
        required: true
    inputs:
      DOCKER_TAG:
        required: true
        type: string
      GITEA_TAG:
        required: true
        type: string
      GITEA_REPO:
        type: string
        default: "https://github.com/go-gitea/gitea.git"
      GITEA_VERSION:
        required: true
        type: string

jobs:
  workflow_call:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: Sirherobrine23
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Setup qemu
      uses: docker/setup-qemu-action@v3

    - name: Setup buildx
      uses: docker/setup-buildx-action@v3

    - name: No gogit build
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/arm64,linux/amd64,linux/riscv64,linux/ppc64le,linux/s390x,linux/386,linux/arm/v7
        tags: ghcr.io/sirherobrine23/gitea:${{inputs.DOCKER_TAG}}
        build-args: |
          GITEA_TAG=${{inputs.GITEA_TAG}}
          GITEA_VERSION=${{inputs.GITEA_VERSION}}
          GITEA_REPO=${{inputs.GITEA_REPO}}

    - name: Gogit build
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/arm64,linux/amd64,linux/riscv64,linux/ppc64le,linux/s390x,linux/386,linux/arm/v7
        tags: ghcr.io/sirherobrine23/gitea:${{inputs.DOCKER_TAG}}-gogit
        build-args: |
          GITEA_TAG=${{inputs.GITEA_TAG}}
          GITEA_VERSION=${{inputs.GITEA_VERSION}}
          GITEA_REPO=${{inputs.GITEA_REPO}}
          TAGS=gogit