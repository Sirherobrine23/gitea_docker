name: Gitea
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0/6 * * *
  push:
    branches:
    - main

concurrency:
  cancel-in-progress: true
  group: gitea-build

permissions:
    contents: read
    packages: write
    attestations: write
    id-token: write

jobs:
  checker:
    runs-on: ubuntu-latest
    name: Gitea build
    outputs:
      BUILDS: ${{ steps.checker.outputs.BUILDS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ./checker/go.mod
          cache-dependency-path: ./checker/go.sum
          cache: true

      - name: Build check
        working-directory: ./checker
        run: go build -v ./...

      - name: Check releases
        id: checker
        working-directory: ./checker
        run: go run .
        env:
          GITEA_REPO: "https://github.com/go-gitea/gitea.git"

  gitea-build:
    runs-on: ubuntu-latest
    needs: checker
    name: Gitea build
    strategy:
      matrix:
        include: ${{ fromJSON(needs.checker.outputs.BUILDS) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Github Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: sirherobrine23
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup qemu
        uses: docker/setup-qemu-action@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4

      - name: Gitea build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64,linux/riscv64,linux/ppc64le,linux/s390x,linux/386,linux/arm/v7
          target: gitea
          tags: |
            ghcr.io/sirherobrine23/gitea:${{ matrix.DOCKER_TAG }}
            sirherobrine23/gitea:${{ matrix.DOCKER_TAG }}
          build-args: |
            GITEA_TAG=${{ matrix.GITEA_TAG }}
            GITEA_VERSION=${{ matrix.GITEA_VERSION }}

      - name: Gitea gogit build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64,linux/riscv64,linux/ppc64le,linux/s390x,linux/386,linux/arm/v7
          target: gitea
          tags: |
            ghcr.io/sirherobrine23/gitea:${{ matrix.DOCKER_TAG }}-gogit
            sirherobrine23/gitea:${{ matrix.DOCKER_TAG }}-gogit
          build-args: |
            GITEA_TAG=${{ matrix.GITEA_TAG }}
            GITEA_VERSION=${{ matrix.GITEA_VERSION }}
            GITEA_TAGS=gogit
